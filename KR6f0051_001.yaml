body:
  text: 西天譯經三藏朝散大夫試光祿卿傳梵大師賜紫沙門臣法護等奉詔譯如是我聞一時世尊在王舍城鷲峯山半月妙峯法界殿中與大苾芻衆二萬五千人俱皆阿羅漢一切漏盡離諸煩惱心善解脫慧善解脫如大龍王諸所應作修作已辦去除重擔逮得己利盡諸有結心智解脫諸心自在到於彼岸阿若憍陳如等十八大聲聞而為上首復有七百二十萬俱胝那庾多菩薩摩訶薩衆其名曰妙吉祥童真菩薩摩訶薩財吉祥菩薩摩訶薩覺吉祥菩薩摩訶薩藥王菩薩摩訶薩藥上菩薩摩訶薩等是諸菩薩皆悉善轉不退轉法輪悉於寶積方廣正法而善請問住法雲地其慧高廣猶若須彌善能觀察一切法空無相無願無生無起無性照明廣大甚深法理善威儀道而諸菩薩皆是各各世界百千俱胝那庾多諸佛如來遣來至此悉能出生諸神通事安住諸法自性清淨爾時世尊即作是念此諸菩薩摩訶薩衆具大威德為求法故從殑伽沙數等大威德世界迅疾如風來此集會我今應為開明宣説廣大正法或現光相廣大照曜復令此諸菩薩摩訶薩衆於此會中聞所説法請問其義爾時世尊即放光明遍照十方不可思議如微塵等三千大千世界即時十方一一方分各有十佛剎不可説如微塵等百千俱胝那庾多菩薩摩訶薩衆來此集會一一菩薩各現不可思議菩薩所有神通而來到佛會已各以不可思議妙色供養而供養佛各各處自願力出生蓮花座中瞻仰世尊是時法界殿中自然出現大寶蓮花藏師子之座縱廣正等阿僧祇俱胝由旬次第高顯以衆光明摩尼寶所成以電光明摩尼寶而為界道不思議光明摩尼寶為蓮花莖無比喻摩尼寶而為間錯超越譬喻光明摩尼寶作殊妙鬘自在王摩尼寶網垂覆其上竪立種種光明摩尼寶蓋及寶幢幡而彼大摩尼寶蓮花藏師子座上普遍出現十阿僧祇百千俱胝那庾多光明其光普照十方世界是時十方一一方分有十佛剎不可説微塵數等百千俱胝那庾多天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽帝釋梵王護世天等皆來集會是中或有處寶樓閣與不思議百千俱胝那庾多天女衆等奏妙音樂或處妙花所成樓閣或處龍堅旃檀香所成樓閣或處真珠所成樓閣或處大金剛寶所成樓閣或處金剛光明摩尼寶所成樓閣或處渾金所成樓閣或處一切光明積集摩尼寶王所成樓閣或處自在王摩尼寶所成樓閣或處如意寶所成樓閣或處帝青摩尼寶所成樓閣或處大海之中清淨莊嚴普遍光明大摩尼寶所成樓閣皆有阿僧祇不思議百千俱胝那庾多天女衆等奏妙音樂乘空而來到佛會已皆以不思議無等比超越分量諸妙供養供養佛已各各於自願力出生座中瞻仰世尊時此三千大千世界悉成閻浮檀金殊妙色相自然出現種種摩尼寶莊嚴樹妙衣服樹龍堅旃檀香樹妙寶所成電光明摩尼寶網垂覆其上竪立寶蓋及寶幢幡其諸樹間皆有阿僧祇百千俱胝那庾多天女執持半身真珠瓔珞或復執持摩尼寶鬘時彼大摩尼寶蓮花藏師子座中自然有聲説伽陀曰人中王來就此座本從福力所出生普令衆願悉圓成勝二足尊願攝受此我身相寶所成中一寶謂蓮花座隨其意樂人中尊能滿諸願救世者今此寶成蓮花座於此世間最殊妙為俱胝衆説法門聞者皆令得此座汝身出現千光相普遍照曜諸世間我觀此相歡喜生願佛今就我此座速就座已攝受我此座數有八俱胝今自然智牟尼尊登座普攝諸群品爾時世尊從本座起即於寶蓮花藏師子座上加趺而坐普遍觀察一切菩薩人天大衆為諸菩薩欲當宣説最上妙法爾時一切大菩薩衆咸作是念若我今時得聞妙吉祥童真菩薩請問如來應供正等正覺不生不滅甚深正法斯為慶幸爾時妙吉祥童真菩薩先在會中知諸菩薩摩訶薩衆心之所念即從座起前白佛言世尊如佛所説不生不滅此所宣説當是世尊何法增語即説伽陀而伸請問不生與不滅此是佛所説大慧相云何於此中宣演若法不生滅即無見無因佛大牟尼尊復云何宣説此十方菩薩諸佛故遣來求大智法門願尊説正法爾時世尊讚妙吉祥童真菩薩摩訶薩言善哉善哉妙吉祥汝今善能請問如來如是義理如汝意者廣為多人作大利益悲愍世間令其修行普得安樂復能利樂諸天人衆今此所來諸大菩薩摩訶薩衆為得佛地故不生恐怖是處施作亦無所畏復無驚悚妙吉祥彼等皆得實智所攝如來今此説如是法所謂不生不滅妙吉祥不生滅者此説即是如來增語譬如吠琉璃寶成大地相於彼所成大地相中而有忉利天中帝釋天主所居之處大廣勝殿而彼天主常處其中受天五欲勝妙快樂嬉戲自在彼諸天衆呼彼閻浮提中若男若女童男童女一切人衆謂言善來汝等且觀帝釋天主大廣勝殿天主於中受勝妙樂汝等來此廣行布施修作福事積集戒行汝等當知今此帝釋天主所居大廣勝殿神通具足汝等宜應修作福事願當獲報如彼天主安處天宮受勝妙樂是時閻浮提中若男若女童男童女一切人衆見此吠琉璃寶所成大地帝釋天主大廣勝殿見已合掌執持香花向空散擲作如是言願我等當來亦獲是相如帝釋天主居廣勝殿受勝妙樂嬉戲自在然彼人衆而悉不知影像對現琉璃大地忉利天中帝釋天主大廣勝殿清淨所成猶如影像妙吉祥彼帝釋天主以廣行布施修作福事積集戒行宿善根力廣成熟故感彼天中勝妙宮殿妙吉祥而彼吠琉璃地本無所有忉利諸天及彼帝釋天主所居大廣勝殿亦無所有皆是清淨所成影像對現而亦常在而實不生亦復不滅妙吉祥一切衆生亦復如是以清淨心如實觀想如來即為對現身相復以如來威神力故令諸衆生得見如來然本無實不生不滅無性非無性無見非無見非世間非非世間無狀貌非無狀貌妙吉祥一切衆生但以如來對現影像而為所緣散擲香花衣服妙寶而為供養作如是言願我當來獲勝妙報同彼如來應供正等正覺彼諸衆生求佛智故廣行布施修作福事積集戒行回向願當得如來智復次妙吉祥又如吠琉璃寶所成大地帝釋天主對現影像無動轉無領受無戲論無分別不離分別無計度不離計度非思惟作意寂靜清涼無生無滅無見無聞無嗅無味無觸無想無施設無表了妙吉祥如來應供正等正覺亦復如是無動轉無領受無戲論無分別不離分別無計度不離計度非思惟作意寂靜清涼無生無滅無見無聞無嗅無味無觸無想無施設無表了如是等如來無所生趣向諸所對現皆如影像隨諸衆生信解差別現諸色相壽量分限但為成熟信解力故是菩提器彼衆生者即為對現隨其意樂隨其信解令諸衆生得聞法要如所樂欲知三乘相如所樂欲悉得解脫妙吉祥又如忉利天中帝釋天主以福力成辦故有大法鼓出妙法音處虛空中大廣勝殿上彼諸天子極目徹視不能觀見妙吉祥彼大法鼓若或忉利天中諸天子衆耽媔嬉戲五欲自娛心生放逸而不樂入善法堂中歌詠法音或時帝釋天主五欲娛樂亦復放逸不處法座為衆説法彼大法鼓處虛空中極目徹視超眼境界不可觀見自然出聲令諸天子開明警覺謂言諸仁者色聲香味觸是無常法汝等今時勿生放逸無令速疾離失宮殿諸行是苦諸行皆空諸法無我勿生放逸此苦蘊滅他趣復生汝諸仁者宜當精勤歌詠正法遊戲法園求法真實愛樂正法於正法中隨念作意即得不離天中五欲娛樂妙吉祥然彼大法鼓無分別無離分別超眼境界不生不滅出語言道離心意識其大法鼓所出法音令彼天衆常所開覺驚怖迷亂即入善法堂中歌詠正法遊戲法園求法真實愛樂正法於正法中隨念作意天趣歿已勝處受生又復帝釋天主入善法堂處于法座為諸天衆宣説法要若時與彼阿修羅衆而共鬪戰天衆或負彼大法鼓自然出聲阿修羅衆驚怖迷亂馳走而去妙吉祥然彼法鼓亦無我相復無言説自然隱歿大法鼓者無所觀矚住於真實無心無思無相無色無聲無性亦復無二超眼境界妙吉祥以彼忉利天中諸天子衆宿善業故有大法鼓出妙法音令彼天衆一切嬈亂隨煩惱等皆悉寂止彼大法鼓而亦常在然其無心亦無所思無相無色無聲無性亦復無二如來應供正等正覺亦復如是無見無觀然亦常在而無我相無心無思無相無色無聲無性超眼境界但隨衆生宿善業報隨其信解為説法音令其開曉聞法音故使諸衆生一切嬈亂隨煩惱等皆得寂止彼法音聲當知即是如來音聲妙吉祥是法音聲而無其實如來但為一切世間權巧施設隨諸衆生宿善業報如來乃為出法音聲隨諸衆生各各意樂而生解了為令一切衆生皆得安樂諸放逸者咸皆警悟妙吉祥一切衆生聞法音已皆願當得如來身相彼新發意菩薩及諸愚夫異生但以如來善法出生而為所緣令其得聞如來法音妙吉祥如來應供正等正覺所説不生不滅甚深法理應如是知
